name: Deploy To Byet Host

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

concurrency:
  group: deploy-byet-host
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy via FTPS
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.BYET_FTP_SERVER }}
          username: ${{ secrets.BYET_FTP_USERNAME }}
          password: ${{ secrets.BYET_FTP_PASSWORD }}
          protocol: ftps
          server-dir: ${{ secrets.BYET_SERVER_DIR }}
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.github/**
            **/docs/**
            **/.env
            **/.env.*
